name: 🔄 Daily Refresh BIG (Lynk + Sleeves + Alertas + Digest)

# Routine unificada de actualizacion del dashboard de BIG.
# Corre los Lunes a Sabado a las 8 AM ART (= 11 UTC).
# Reemplaza los workflows viejos:
#   - lynk-daily-refresh.yml
#   - equity-daily-refresh.yml
#
# Que hace:
#   1. Health-check (solo lunes): verifica que la corrida del sabado anterior haya
#      terminado OK. Si no, deja un warning marker.
#   2. Scrapea Lynk (NAV / YTD / SI / AUM / Vol / Sharpe) — KPIs principales.
#   3. Scrapea baha (NAVs de equity + FI funds UCITS).
#   4. Stooq prices (ETFs liquidos).
#   5. Yahoo bench indices (ACWI, AGG, SOFR para Normalized Performance).
#   6. Recompute Equity sleeve daily NAV + Equity Race (buy-and-hold vs ACWI).
#   7. Recompute FI sleeve daily NAV + FI Race (per-fondo T-1 con anclas baha).
#   8. Recompute Alts Race (liquidos: IBIT, GLD).
#   9. Brinson Attribution YTD.
#   10. Commit + push (data/) — los charts del dashboard se actualizan solos.
#   11. Record run status (success/failure marker en data/_alerts/).
#   12. Weekly digest (solo sabados): mail a Lucas + Fer con resumen semanal.
#
# Alertas:
#   - Si algo falla, queda marker en data/_alerts/cron_failure_YYYY-MM-DD.json
#   - Claude lo detecta al inicio de sesion (regla en MEMORY.md) y avisa a Lucas.

on:
  schedule:
    # 11:00 UTC = 08:00 ART, Lunes a Sabado (1-6 en cron weekday).
    - cron: '0 11 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      LYNK_EMAIL: ${{ secrets.LYNK_EMAIL || 'lucas.monpelat@pampa-capital.com' }}
      BAHA_EMAIL: ${{ secrets.BAHA_EMAIL }}
      BAHA_PASSWORD: ${{ secrets.BAHA_PASSWORD }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_LUCAS: ${{ secrets.MAIL_LUCAS }}
      MAIL_FER: ${{ secrets.MAIL_FER }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Detect day of week (set outputs)
        id: dow
        run: |
          DOW=$(date -u +%u)  # 1=Mon ... 6=Sat ... 7=Sun
          echo "dow=$DOW" >> $GITHUB_OUTPUT
          if [ "$DOW" = "1" ]; then echo "is_monday=true"   >> $GITHUB_OUTPUT; else echo "is_monday=false"   >> $GITHUB_OUTPUT; fi
          if [ "$DOW" = "6" ]; then echo "is_saturday=true" >> $GITHUB_OUTPUT; else echo "is_saturday=false" >> $GITHUB_OUTPUT; fi
          echo "Hoy es $(date -u +%A), dow=$DOW"

      # === HEALTH CHECK (solo lunes) ===
      - name: Health-check Saturday's run (Mondays only)
        if: steps.dow.outputs.is_monday == 'true'
        run: python scripts/check_previous_run.py --expected-day saturday
        continue-on-error: true

      # === SCRAPING ===
      - name: Lynk NAV scrape (KPIs)
        run: python scripts/lynk_refresher.py --email "$LYNK_EMAIL"

      - name: Lynk NAV series (full history)
        run: python scripts/lynk_nav_extractor.py --email "$LYNK_EMAIL"
        continue-on-error: true

      - name: Baha NAV refresher (Equity + FI UCITS)
        run: python scripts/baha_nav_refresher.py
        continue-on-error: true

      - name: Stooq prices (ETFs liquidos)
        run: python scripts/price_refresher.py
        continue-on-error: true

      - name: Bench indices Equity (ACWI / S&P / Nasdaq / MSCI World)
        run: python scripts/bench_indices_refresher.py
        continue-on-error: true

      - name: Bench indices FI (AGG / SOFR / UST)
        run: python scripts/fi_bench_indices_refresher.py
        continue-on-error: true

      - name: Bench 60/40 (AOR ETF)
        run: python scripts/bmk_refresher.py
        continue-on-error: true

      # === RECOMPUTE ===
      - name: Recalc Equity sleeve daily NAV
        run: python scripts/refresh_equity_daily.py

      - name: Recalc Equity race daily (buy-and-hold vs ACWI)
        run: python scripts/refresh_equity_race_daily.py
        continue-on-error: true

      - name: Recalc FI sleeve daily NAV
        run: python scripts/refresh_fi_daily.py

      - name: Recalc FI race daily (per-fondo T-1 anclas baha)
        run: python scripts/refresh_fi_race_daily.py
        continue-on-error: true

      - name: Recalc Alts race daily (liquidos)
        run: python scripts/refresh_alts_daily.py
        continue-on-error: true

      - name: Brinson Attribution YTD
        run: python scripts/compute_attribution.py
        continue-on-error: true

      # === COMMIT + PUSH ===
      - name: Commit and push data/ if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes" && echo "committed=false" >> $GITHUB_OUTPUT && exit 0
          fi
          git commit -m "chore(daily): refresh BIG ($(date -u +%Y-%m-%d))"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            if git push origin HEAD:main; then echo "committed=true" >> $GITHUB_OUTPUT && exit 0; fi
            sleep 3
          done
          exit 1

      # === RECORD STATUS (siempre, ultimo paso antes del digest) ===
      - name: Record run status (alertas)
        if: always()
        run: python scripts/record_run_status.py --job-status "${{ job.status }}"

      - name: Commit alertas si hubo cambios
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/_alerts/ || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore(alerts): run status $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            if git push origin HEAD:main; then exit 0; fi
            sleep 3
          done

      # === WEEKLY DIGEST (solo sabados) ===
      - name: Weekly digest mail (Saturdays only)
        if: steps.dow.outputs.is_saturday == 'true'
        run: python scripts/weekly_dige
