name: 💹 Stooq ETF Prices + 60/40 Benchmark Daily Refresh

on:
  # Runs every day at 02:30 UTC (~23:30 ART). 30 min despues del cron Lynk.
  schedule:
    - cron: '30 2 * * *'
  # Manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-stooq-bmk:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (requests + yfinance)
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas

      - name: Run Stooq price refresher (ETFs: CSPX, ILF, ARGT, GLD, IBIT, 4BRZ, etc.)
        run: |
          python scripts/price_refresher.py

      - name: Run 60/40 benchmark refresher (ACWI + AGG via Yahoo)
        run: |
          python scripts/bmk_refresher.py

      - name: Show updated data
        run: |
          echo "=== live_prices.json (head) ==="
          head -c 600 data/live_prices.json || echo "(missing)"
          echo ""
          echo "=== bmk_6040.json (periods) ==="
          python -c "import json; print(json.dumps(json.load(open('data/bmk_6040.json'))['periods'], indent=2))" || echo "(missing)"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/live_prices.json data/bmk_6040.json; then
            echo "No changes — skipping commit."
            exit 0
          fi

          git add data/live_prices.json data/bmk_6040.json
          git commit -m "chore(daily): auto-refresh Stooq prices + 60/40 benchmark ($(date -u +%Y-%m-%d))"

          # Rebase sobre el ultimo main por si se movio (Lynk corre 30 min antes,
          # pueden chocar pushes). Reintenta hasta 3 veces.
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; echo "rebase fallo"; exit 1; }
            if git push origin HEAD:main; then
              echo "✓ Pushed updated daily data (intento $attempt)."
              exit 0
            fi
            echo "push rechazado (intento $attempt) — reintentando..."
            sleep 3
          done
          echo "ERROR: no se pudo pushear tras 3 intentos"
          exit 1
