name: 💹 Stooq ETF Prices Daily Refresh

on:
  # Runs every day at 02:30 UTC (~23:30 ART). 30 min despues del cron Lynk.
  schedule:
    - cron: '30 2 * * *'
  # Manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-stooq:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (solo requests, sin Playwright)
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Stooq price refresher
        run: |
          python scripts/price_refresher.py

      - name: Show updated prices
        run: |
          echo "=== live_prices.json (snippet) ==="
          head -c 800 data/live_prices.json || echo "(missing)"
          echo ""

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/live_prices.json; then
            echo "No changes a live_prices.json — skipping commit."
            exit 0
          fi

          git add data/live_prices.json
          git commit -m "chore(stooq): auto-refresh ETF prices ($(date -u +%Y-%m-%d))"

          # Rebase sobre el ultimo main por si se movio (Lynk corre 30 min antes,
          # pueden chocar pushes). Reintenta hasta 3 veces.
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; echo "rebase fallo"; exit 1; }
            if git push origin HEAD:main; then
              echo "✓ Pushed updated Stooq prices (intento $attempt)."
              exit 0
            fi
            echo "push rechazado (intento $attempt) — reintentando..."
            sleep 3
          done
          echo "ERROR: no se pudo pushear tras 3 intentos"
          exit 1
