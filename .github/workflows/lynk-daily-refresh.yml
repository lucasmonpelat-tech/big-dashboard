name: 🔄 Lynk NAV Daily Refresh

on:
  # 14:00 UTC = 11:00 ART. Lynk publica el NAV T-1 overnight, ya esta disponible.
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

# Need write to push the updated JSON back to main
permissions:
  contents: write

jobs:
  refresh-lynk:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install --with-deps chromium

      - name: Run Lynk refresher (NAV / AUM / KPIs)
        env:
          LYNK_EMAIL: ${{ secrets.LYNK_EMAIL || 'lucas.monpelat@pampa-capital.com' }}
        run: |
          python scripts/lynk_refresher.py --email "$LYNK_EMAIL"

      - name: Run Lynk NAV series extractor (full history)
        env:
          LYNK_EMAIL: ${{ secrets.LYNK_EMAIL || 'lucas.monpelat@pampa-capital.com' }}
        run: |
          python scripts/lynk_nav_extractor.py --email "$LYNK_EMAIL"
        continue-on-error: true  # Don't fail if extractor has issues — main NAV refresher already ran

      - name: Show updated data
        run: |
          echo "=== lynk_data.json ==="
          cat data/lynk_data.json || echo "(missing)"
          echo ""
          echo "=== lynk_nav_series.json (head) ==="
          head -c 500 data/lynk_nav_series.json || echo "(missing)"
          echo ""

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/lynk_data.json data/lynk_nav_series.json; then
            echo "No changes to Lynk data — skipping commit."
            exit 0
          fi

          git add data/lynk_data.json data/lynk_nav_series.json
          git commit -m "chore(lynk): auto-refresh NAV daily ($(date -u +%Y-%m-%d))"

          # Rebase sobre el ultimo main por si se movio (re-runs, pushes concurrentes).
          # Reintenta hasta 3 veces ante carrera de pushes.
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; echo "rebase fallo"; exit 1; }
            if git push origin HEAD:main; then
              echo "✓ Pushed updated Lynk data (intento $attempt)."
              exit 0
            fi
            echo "push rechazado (intento $attempt) — reintentando..."
            sleep 3
          done
          echo "ERROR: no se pudo pushear tras 3 intentos"
          exit 1
